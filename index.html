<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Paróquia de São Francisco das Chagas</title>
    <link rel="stylesheet" href="/css/global.css">
</head>
<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 500;">Carregando...</p>
    </div>

    <div class="form-container">
        <div class="form-header">
            <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </div>
                <div class="logo-text" style="text-align: left;">
                    <span class="logo-main">São Francisco</span>
                    <span class="logo-sub">Paróquia</span>
                </div>
            </div>
            <h2 class="font-serif" style="font-size: 1.5rem; color: var(--church-brown-dark);">Acesso ao Sistema</h2>
            <p style="font-size: 0.875rem; color: var(--church-brown-medium); margin-top: 0.5rem;">Entre com suas credenciais para continuar</p>
        </div>

        <div id="alert-container" class="alert alert-error hidden"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="input-field" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn">
                <span>Entrar</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--church-brown-medium);">
            <p>&copy; 2026 Paróquia de São Francisco das Chagas</p>
            <p>Todos os direitos reservados.</p>
        </div>
    </div>

    <script type="module" src="/js/login.js"></script>
</body>
</html>
