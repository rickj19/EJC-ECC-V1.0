<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Paróquia de São Francisco das Chagas</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 500;">Carregando painel...</p>
    </div>

    <div id="main-content" class="admin-layout hidden">
        <aside>
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </div>
                <div class="logo-text">
                    <span class="logo-main" style="color: white;">São Francisco</span>
                    <span class="logo-sub">Administração</span>
                </div>
            </div>

            <nav style="background: transparent; border: none; padding: 0; box-shadow: none; display: flex; flex-direction: column; gap: 0.5rem;">
                <a href="#" class="nav-link active" id="nav-dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-link" id="nav-registrations">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
                    Inscrições
                </a>
                <a href="#" class="nav-link" id="nav-users">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Usuários
                </a>
            </nav>

            <div style="margin-top: auto;">
                <button id="logout-btn" class="btn btn-outline" style="color: white; border-color: rgba(255,255,255,0.2);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sair
                </button>
            </div>
        </aside>

        <main>
            <div class="header-bar">
                <div>
                    <h1 class="font-serif" style="font-size: 1.75rem;">Dashboard Administrativo</h1>
                    <p style="color: var(--church-brown-medium); font-size: 0.875rem;">Bem-vindo, <span id="user-name">Administrador</span></p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-gold" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Nova Inscrição
                    </button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Inscrições</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">EJC</div>
                    <div class="stat-value" id="stat-ejc" style="color: #0369a1;">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">ECC</div>
                    <div class="stat-value" id="stat-ecc" style="color: #92400e;">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Usuários Ativos</div>
                    <div class="stat-value" id="stat-users">0</div>
                </div>
            </div>

            <div class="data-table-container">
                <div style="padding: 1.5rem; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center;">
                    <h3 class="font-serif">Inscrições Recentes</h3>
                    <a href="#" style="font-size: 0.75rem; color: var(--church-gold); font-weight: bold; text-transform: uppercase;">Ver todas</a>
                </div>
                <table id="registrations-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="registrations-body">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="/js/admin.js"></script>
</body>
</html>
